<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulle privée — JOVERIA</title>
<link rel="icon" href="icon-32.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#0B0B0C">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, "Inter", sans-serif;
    background: #0B0B0C; color: #EDE7D9; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .card { width: 100%; max-width: 420px; border: 1px solid #2A2517; border-radius: 14px; overflow: hidden; background: #0F0E10; }
  .entry { padding: 40px 26px; text-align: center; }
  .entry h1 { font-family: Georgia, serif; font-size: 19px; color: #E8C766; margin: 0 0 6px; }
  .entry p { font-size: 12px; color: #8A8678; line-height: 1.5; margin: 0 0 24px; }
  button.primary { width: 100%; padding: 13px 0; background: #C9A227; color: #0B0B0C; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .chat { display: flex; flex-direction: column; height: 80vh; max-height: 640px; }
  .chat-header { padding: 12px 16px; background: #141216; border-bottom: 1px solid #2A2517; display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
  .chat-header .name { color: #E8C766; font-family: Georgia, serif; }
  .status-bar { padding: 8px 16px; font-size: 10px; color: #8A8678; background: #141216; border-bottom: 1px solid #2A2517; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .status-bar button { background: none; border: 1px solid #4A3E18; border-radius: 6px; color: #C9A227; font-size: 10px; padding: 4px 8px; cursor: pointer; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 78%; padding: 9px 12px; border-radius: 12px; font-size: 13px; line-height: 1.4; white-space: pre-wrap; }
  .msg.client { align-self: flex-end; background: #C9A227; color: #0B0B0C; }
  .msg.commercant { align-self: flex-start; background: #1A1812; color: #EDE7D9; }
  .msg .t { font-size: 9px; opacity: .6; margin-top: 3px; }
  .composer { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #2A2517; background: #0F0E10; }
  .composer input { flex: 1; background: #1A1812; border: 1px solid #2A2517; border-radius: 8px; padding: 10px 12px; color: #EDE7D9; font-size: 13px; outline: none; }
  .composer button { background: #C9A227; border: none; border-radius: 8px; width: 40px; cursor: pointer; }
  #error { font-size: 12px; color: #E24B4A; text-align: center; padding: 40px 20px; }
</style>
</head>
<body>
<div class="card" id="app"><div id="error" style="display:none"></div></div>

<script>
(async function () {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get("b") || localStorage.getItem("joveria_last_slug");
  const app = document.getElementById("app");
  let pollTimer = null;

  function showError(msg) { app.innerHTML = `<div id="error">${msg}</div>`; }

  if (!slug) { showError("Lien invalide. Ce QR code ne correspond à aucun commerçant."); return; }

  const { data: business, error: bizError } = await supabaseClient.rpc("get_business_public_info", { business_slug: slug }).single();
  if (bizError || !business) {
    localStorage.removeItem("joveria_last_slug");
    showError("Ce lien n'est plus valide.");
    return;
  }
  localStorage.setItem("joveria_last_slug", slug);

  const storageKey = "joveria_bulle_" + slug;
  let bulleId = localStorage.getItem(storageKey);

  if (bulleId) {
    const { data: existing } = await supabaseClient.rpc("get_bulle", { bulle_id: bulleId }).maybeSingle();
    if (!existing) { bulleId = null; localStorage.removeItem(storageKey); }
  }

  if (!bulleId) renderEntry(); else renderChat(bulleId);

  function renderEntry() {
    if (pollTimer) clearInterval(pollTimer);
    app.innerHTML = `
      <div class="entry">
        <h1>${business.name}</h1>
        <p>Ouvrez une conversation privée avec ${business.name}, sans échanger de numéro. Elle sera supprimée automatiquement, sauf si vous demandez à la conserver.</p>
        <input id="name-input" placeholder="Votre prénom ou surnom (facultatif)" style="width:100%;background:#1A1812;border:1px solid #2A2517;border-radius:8px;padding:10px 12px;color:#EDE7D9;font-size:13px;outline:none;margin-bottom:14px;box-sizing:border-box" maxlength="40" />
        <button class="primary" id="open-btn">Ouvrir une conversation privée</button>
      </div>`;
    document.getElementById("open-btn").addEventListener("click", openBulle);
  }

  async function openBulle() {
    const nameInput = document.getElementById("name-input");
    const clientName = nameInput ? nameInput.value.trim() : "";
    const { data, error } = await supabaseClient.rpc("open_bulle", { business_slug: slug, client_name: clientName || null }).single();
    if (error) { showError("Impossible d'ouvrir la conversation. Réessayez."); return; }
    localStorage.setItem(storageKey, data.id);
    renderChat(data.id);
  }

  function renderChat(id) {
    app.innerHTML = `
      <div class="chat">
        <div class="chat-header">
          <div style="display:flex;gap:10px">
            <button id="delete-btn" style="background:none;border:none;color:#8A8678;cursor:pointer;font-size:11px">Supprimer</button>
            <button id="block-btn" style="background:none;border:none;color:#E24B4A;cursor:pointer;font-size:11px">Bloquer</button>
          </div>
          <span class="name">${business.name}</span>
          <span style="width:80px"></span>
        </div>
        <div class="status-bar"><span id="status-text">Chargement…</span><span id="status-action"></span></div>
        <div class="messages" id="messages"></div>
        <div class="composer">
          <button id="location-btn" title="Partager ma position" style="background:#1A1812;border:1px solid #2A2517;border-radius:8px;width:40px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C9A227" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></button>
          <input id="input" placeholder="Votre message…" />
          <button id="send-btn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#0B0B0C" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
        </div>
      </div>`;

    document.getElementById("delete-btn").addEventListener("click", async () => {
      if (!confirm("Supprimer définitivement cette conversation ?")) return;
      await supabaseClient.rpc("delete_bulle", { bulle_id: id });
      localStorage.removeItem(storageKey);
      renderEntry();
    });
    document.getElementById("block-btn").addEventListener("click", async () => {
      if (!confirm("Bloquer cette conversation ? Les messages seront définitivement supprimés et plus personne ne pourra écrire ici.")) return;
      await supabaseClient.rpc("block_bulle", { bulle_id: id, blocked_by: "client" });
      loadStatus(id);
      loadMessages(id);
    });
    document.getElementById("send-btn").addEventListener("click", () => sendMessage(id));
    document.getElementById("input").addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(id); });
    document.getElementById("location-btn").addEventListener("click", () => shareLocation(id));

    loadMessages(id);
    loadStatus(id);
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(() => { loadMessages(id); loadStatus(id); }, 3000);
  }

  async function loadMessages(id) {
    const { data } = await supabaseClient.rpc("get_messages", { bulle_id: id });
    const box = document.getElementById("messages");
    if (!box) return;
    const wasAtBottom = box.scrollTop + box.clientHeight >= box.scrollHeight - 10;
    box.innerHTML = (data || []).map(renderMsg).join("") || `<div style="font-size:11px;color:#5C584C;text-align:center;margin-top:20px">Bulle ouverte. Écrivez votre message.</div>`;
    if (wasAtBottom) box.scrollTop = box.scrollHeight;
  }

  function renderMsg(m) {
    const time = new Date(m.created_at).toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
    return `<div class="msg ${m.sender}">${linkify(m.text)}<div class="t">${time}</div></div>`;
  }
  function escapeHtml(str) { const div = document.createElement("div"); div.textContent = str; return div.innerHTML; }

  function linkCardLabel(url) {
    const u = url.toLowerCase();
    if (u.includes("waze.com")) return "📍 Ouvrir dans Waze";
    if (u.includes("maps.google") || u.includes("google.com/maps") || u.includes("goo.gl/maps") || u.includes("maps.app.goo.gl")) return "📍 Ouvrir dans Google Maps";
    if (u.includes("maps.apple.com")) return "📍 Ouvrir dans Plans";
    if (u.includes("drive.google.com")) return "📄 Ouvrir le document";
    if (u.includes("youtube.com") || u.includes("youtu.be")) return "▶️ Voir la vidéo";
    if (u.includes("instagram.com")) return "📷 Voir sur Instagram";
    if (u.includes("tiktok.com")) return "🎵 Voir sur TikTok";
    return "🔗 Ouvrir le lien";
  }

  function linkify(text) {
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    const parts = text.split(urlRegex);
    return parts.map(part => {
      if (/^https?:\/\//.test(part)) {
        const label = linkCardLabel(part);
        return `<a href="${escapeHtml(part)}" target="_blank" rel="noopener" style="display:block;margin:4px 0;padding:7px 10px;background:rgba(0,0,0,0.15);border-radius:8px;color:inherit;text-decoration:none;font-size:12px;font-weight:600">${label}</a>`;
      }
      return escapeHtml(part);
    }).join("");
  }

  async function shareLocation(id) {
    if (!navigator.geolocation) { alert("La géolocalisation n'est pas disponible sur cet appareil."); return; }
    const btn = document.getElementById("location-btn");
    if (btn) btn.disabled = true;
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        try {
          const lat = pos.coords.latitude.toFixed(6);
          const lng = pos.coords.longitude.toFixed(6);
          const text = `Ma position :\nhttps://www.waze.com/ul?ll=${lat},${lng}&navigate=yes\nhttps://www.google.com/maps?q=${lat},${lng}`;
          const { error } = await supabaseClient.rpc("send_message", { bulle_id: id, sender: "client", text });
          if (error) { alert("Erreur lors de l'envoi de la position : " + error.message); return; }
          loadMessages(id);
        } catch (err) {
          alert("Erreur : " + (err && err.message ? err.message : String(err)));
        } finally {
          if (btn) btn.disabled = false;
        }
      },
      (err) => {
        alert("Impossible d'obtenir ta position (" + err.message + "). Vérifie que la géolocalisation est autorisée dans les réglages.");
        if (btn) btn.disabled = false;
      }
    );
  }

  async function sendMessage(id) {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;
    input.value = "";
    await supabaseClient.rpc("send_message", { bulle_id: id, sender: "client", text });
    loadMessages(id);
  }

  async function loadStatus(id) {
    const { data: bulle } = await supabaseClient.rpc("get_bulle", { bulle_id: id }).single();
    renderStatus(bulle);
  }

  function renderStatus(bulle) {
    if (!bulle) return;
    const statusText = document.getElementById("status-text");
    const statusAction = document.getElementById("status-action");
    if (!statusText) return;

    const composer = document.querySelector(".composer");
    const blockBtn = document.getElementById("block-btn");

    if (bulle.status === "blocked") {
      statusText.textContent = bulle.blocked_by === "client"
        ? "Vous avez bloqué cette conversation"
        : "Le commerçant a bloqué cette conversation";
      statusAction.innerHTML = "";
      if (composer) composer.style.display = "none";
      if (blockBtn) blockBtn.style.display = "none";
      return;
    }
    if (composer) composer.style.display = "flex";
    if (blockBtn) blockBtn.style.display = "inline";

    const daysLeft = Math.max(0, Math.ceil((new Date(bulle.expires_at) - Date.now()) / (1000 * 60 * 60 * 24)));

    if (bulle.retention_status === "kept") {
      statusText.textContent = "Conversation conservée";
      statusAction.innerHTML = "";
    } else if (bulle.keep_request_status === "refused" && bulle.keep_requested_by === "client") {
      statusText.textContent = "Le commerçant a refusé de conserver cette conversation";
      statusAction.innerHTML = `<button id="ack-refuse">OK</button>`;
      document.getElementById("ack-refuse").addEventListener("click", () => acknowledgeRefusal(bulle.id));
    } else if (bulle.keep_request_status === "requested" && bulle.keep_requested_by === "commercant") {
      statusText.textContent = "Le commerçant souhaite conserver cette conversation";
      statusAction.innerHTML = `<button id="accept-keep">Accepter</button> <button id="refuse-keep">Refuser</button>`;
      document.getElementById("accept-keep").addEventListener("click", () => respondKeep(bulle.id, "accepted"));
      document.getElementById("refuse-keep").addEventListener("click", () => respondKeep(bulle.id, "refused"));
    } else if (bulle.keep_request_status === "requested" && bulle.keep_requested_by === "client") {
      statusText.textContent = "Demande de conservation envoyée, en attente de réponse";
      statusAction.innerHTML = "";
    } else {
      statusText.textContent = `Suppression automatique dans ${daysLeft} jour${daysLeft > 1 ? "s" : ""}`;
      statusAction.innerHTML = `<button id="request-keep">Demander à conserver</button>`;
      document.getElementById("request-keep").addEventListener("click", () => requestKeep(bulle.id));
    }
  }

  async function requestKeep(id) { await supabaseClient.rpc("request_keep", { bulle_id: id, requested_by: "client" }); loadStatus(id); }
  async function respondKeep(id, decision) { await supabaseClient.rpc("respond_keep", { bulle_id: id, decision }); loadStatus(id); }
  async function acknowledgeRefusal(id) { await supabaseClient.rpc("respond_keep", { bulle_id: id, decision: "none" }); loadStatus(id); }
})();
</script>
</body>
</html>
